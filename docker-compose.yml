version: '3.8'

services:
  audio-listener:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noise-audio-listener
    privileged: true
    network_mode: "host"
    volumes:
      - ./data:/app/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noise-dashboard
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - audio-listener
    restart: unless-stopped
